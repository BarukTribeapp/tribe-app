databases:
  - name: tribe-db
    databaseName: tribe_db
    user: tribe_user
    plan: free
    region: virginia

services:
  - type: web
    runtime: java
    name: tribe-app
    rootDir: backend
    plan: free
    region: virginia
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/tribe-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tribe-db
          property: connectionString
